<!DOCTYPE html>
<!-- playing around with the apis v.2 -->
<h1>/minecraft v2 (test)</h1>
<body>
  <div id="serverinfo"></div>

<script>
fetch("https://api.mcsrvstat.us/3/l3gh.com")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("serverinfo");
    container.innerHTML = "";

    // Online/offline
    const status = document.createElement("div");
    status.textContent = "Status: " + (data.online ? "Online" : "Offline");
    container.appendChild(status);

    // Player count
    if (data.players) {
      const players = document.createElement("div");
      players.textContent = `Players: ${data.players.online} / ${data.players.max}`;
      container.appendChild(players);
    }

    // Protocol / version name
    if (data.version) {
      const version = document.createElement("div");
      version.textContent = "Protocol / Version: " + data.version;
      container.appendChild(version);
    }

    // --- NEW: Player list with faces ---
    // Check that the server is online AND that a list of players exists
    if (data.online && data.players?.list?.length) {

      // Create a wrapper div to hold all the player cards
      const playerList = document.createElement("div");
      playerList.style.display = "flex";
      playerList.style.flexWrap = "wrap";
      playerList.style.gap = "10px";
      playerList.style.marginTop = "10px";

      // Loop through each player in the list
      data.players.list.forEach(player => {

        // Create a card div for this individual player
        const card = document.createElement("div");
        card.style.display = "flex";
        card.style.alignItems = "center";
        card.style.gap = "6px";

        // Create the face image using their UUID
        const img = document.createElement("img");
        img.src = `https://mc-heads.net/face/${player.uuid}/32`;
        img.alt = player.name;

        // Create the name label
        const name = document.createElement("span");
        name.textContent = player.name;

        // Put the image and name together inside the card
        card.appendChild(img);
        card.appendChild(name);

        // Add this card to the player list wrapper
        playerList.appendChild(card);
      });

      // Finally, add the whole player list to the main container
      container.appendChild(playerList);
    }
    // --- END new section ---

  })
  .catch(err => {
    document.getElementById("serverinfo").textContent = "Error fetching server info: " + err;
  });
</script>
</body>
