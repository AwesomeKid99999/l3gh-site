<!DOCTYPE html>
<html>
    <head>
        <title>Flexbox Practice</title>
        
    </head>

    <body style="padding-bottom: 1000px;">
        <div style="
            height: 100px;
            display: flex;
            flex-direction: row;
            justify-content: center;
            border-width: 1px;
            border-style: solid;
            border-color: gray;
        ">
            <div style="
                background-color: lightblue;
                width: 100px;
            ">
                100px

            <div style="
                background-color: lightpink;
                width: 100px;

                100px

                width: 100px;

                100px

        </div>

        <div style="
            height: 100px;
            display: flex;

                background-color: lightblue;
                width: 100px;

            ">
                100px
            </div>

            <div style="
                background-color: lightblue;
                width: 100px;
            ">
                100px
            </div>
        </div>

        <div style="
            height: 100px;
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            border-width: 1px;
            border-style: solid;
            border-color: gray;
            align-items: center;
        ">
            <div style="
                background-color: lightblue;
                width: 100px;
            ">
                100px
            </div>
            <div style="
                background-color: lightpink;
                width: 100px;
            ">
                100px
            </div>

            <div style="
                background-color: lightblue;
                width: 100px;
            ">
                100px
            </div>
        </div>

        <div style="
            display: flex;
            flex-direction: row;
            margin-top: 10px;
        ">
            <div style="background-color: lightblue;">
                div1 <p>dih</p>
            </div>
            <div style="background-color: lightpink;">
                div2
            </div>
        </div>


        <div style="
            display: flex;
            flex-direction: row;
            margin-top: 10px;
        ">
            <div style="
                background-color: lightblue;
                width: 100px;
                ">
                    100px
            </div>
            <div style="
                background-color: lightpink;
                flex: 1;
                ">
                    flex 1 <p>dih</p>
            </div>
        </div>

        <div>
            <div style="
                display: flex;
                flex-direction: row;
                margin-top: 10px;
            ">

                <div style="
                background-color: lightblue;
                width: 100px;
                ">
                    100px
                </div>

                <div style="
                background-color: lightpink;
                flex: 1;
                ">
                    flex 1 <p>dih</p>
                </div>

                <div style="
                background-color: lightblue;
                flex: 2;
                ">
                    flex 2
                </div>
            </div>
        </div>
    </body>

</html>
